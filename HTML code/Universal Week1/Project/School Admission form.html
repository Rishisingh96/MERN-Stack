<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School-Admission form</title>
</head>

<body>
  <h1>School-Admission Form</h1><br>
  <label for="Student name"> Student Name* :</label>
  <input type="text" name="Student first" placeholder="First name">
  <input type="text" name="Student last" placeholder="Last name"><br>

  <label for="Student name"> Father Name* :</label>
  <input type="text" name="Father first" placeholder="First name">
  <input type="text" name="Father last" placeholder="Last name"><br>

  <label for="Student name"> Mother Name* :</label>
  <input type="text" name="Mother first" placeholder="First name">
  <input type="text" name="Mother last" placeholder="Last name"><br>
  <label>Class you want to apply for* : <br>
    <label4>For example : class 2015-2016.</label4>
  </label>
  <input type="text" name="apply"><BR>
  <label>Student DoB* :</label>
  <input type="date" name="Date" placeholder="MM/DD/YYYY"><br>
  <label>current address :</label>
  <input type="text" name="Street Address" placeholder="Street Address"><br>
  <input type="text" name="Street Address line2 " placeholder="Street Address line2 "><br>
  <input type="text" name="City" placeholder="City">
  <input type="text" name="Region" placeholder="Region"><br>
  <input type="number" name="Postal/Zip Code" placeholder="Postal/Zip Code">
  <select name="Country" placeholder="Country">
    <option value="select" selected disabled>Country</option>
    <option value="Basti">Basti</option>
    <option value="Indoor">Indoor</option>
    <option value="M.P">M.P</option>
    <option value="U.P">U.P</option>
  </select>

</body>

</html>
